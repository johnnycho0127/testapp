<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Recipe and History App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            user-select: none; /* Make text non-selectable for app feel */
        }

        /* Container to simulate the mobile phone screen */
        .phone-container {
            width: 375px; 
            height: 812px; 
            background-color: white;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid #333; 
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
        }
        .status-bar-icons {
            display: flex; gap: 4px; align-items: center;
        }

        /* Header (Dynamic based on Page) */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            border-bottom: 1px solid #eaeaea;
        }
        .header-left {
            display: flex; align-items: center; width: 44px;
        }
        .back-btn {
            background: none; border: none; cursor: pointer; padding: 0;
            font-size: 2.2rem; color: #333; /* Larger for better tap */
            display: flex; justify-content: flex-start; align-items: center;
            line-height: 1;
        }
        .app-title {
            font-size: 20px; font-weight: 600; flex-grow: 1; text-align: center;
        }
        .menu-btn {
            background: none; border: none; cursor: pointer; width: 44px;
            height: 44px; display: flex; flex-direction: column;
            justify-content: center; align-items: flex-end; padding: 10px;
        }
        .menu-bar {
            width: 20px; height: 2px; background-color: #333; margin-bottom: 4px; transition: 0.3s;
        }
        .menu-bar:last-child { margin-bottom: 0; width: 14px; }

        /* Content Areas (Switchable) */
        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
            display: none; /* Hidden by default */
        }
        .content-area.active {
            display: block; /* Show active */
        }

        /* Common Pill Component */
        .for-pill-container {
            background-color: black; border-radius: 12px;
            padding: 8px 16px; display: flex; align-items: center;
            gap: 12px; margin-bottom: 24px; cursor: pointer;
        }
        .for-label { color: white; font-size: 16px; font-weight: 600; }
        .pill {
            background-color: white; color: #333; border-radius: 20px;
            padding: 6px 16px; font-size: 14px; font-weight: 500;
        }

        /* --- PAGE 1: Recommendations --- */
        .ingredients-card {
            background-color: #efefef; border-radius: 16px;
            padding: 16px; margin-bottom: 24px;
        }
        .ingredient-item {
            display: flex; align-items: center; margin-bottom: 12px; cursor: pointer;
        }
        .ingredient-checkbox {
            appearance: none; width: 18px; height: 18px;
            border: 2px solid #555; border-radius: 4px;
            margin-right: 12px; cursor: pointer; position: relative;
            background-color: white; transition: 0.2s;
        }
        .ingredient-checkbox:checked { background-color: black; border-color: black; }
        .ingredient-checkbox:checked::after {
            content: ''; position: absolute; left: 5px; top: 1px;
            width: 4px; height: 8px; border: solid white; border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .recipe-card {
            background-color: #8c8c8c; border-radius: 16px;
            padding: 16px; margin-bottom: 16px; display: flex;
            align-items: center; gap: 16px; cursor: pointer;
            transition: opacity 0.2s; display: none; /* Default hidden */
        }
        .recipe-card.show { display: flex; }
        .recipe-image-container {
            width: 100px; height: 100px; background-color: white;
            border-radius: 8px; overflow: hidden; display: flex;
            justify-content: center; align-items: center;
        }
        .recipe-image { width: 100%; height: 100%; object-fit: cover; }
        .recipe-title { font-size: 18px; font-weight: 600; color: #333; }
        .recipe-description { font-size: 14px; color: #333; }

        /* --- PAGE 2: History Story --- */
        .history-card {
            background-color: #efefef; /* Light grey block */
            border-radius: 16px;
            padding: 24px; /* More padding for text comfort */
            margin-bottom: 24px;
        }
        .story-text {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 24px; /* Gap between paragraphs */
        }
        .story-text:last-child { margin-bottom: 0; }
        .source-link {
            font-size: 12px;
            color: #888;
            margin-top: 16px;
            word-break: break-all;
            text-decoration: none;
            display: block;
        }
        .source-link:hover { text-decoration: underline; }

        /* Titles and Labels */
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .small-label { font-size: 14px; font-weight: 500; color: #555; margin-bottom: 12px; display: block; }

    </style>
</head>
<body>

<div class="phone-container">
    <div class="status-bar">
        <span>9:41</span>
        <div class="status-bar-icons">
            <svg width="17" height="12"><path fill="#333" d="M10.3 1.3C8.6.6 6.8 1 5.3 2.1 3.9 3.2 3.1 4.7 3.1 6.4c0 1.7.8 3.2 2.2 4.3 1.5 1.1 3.3 1.5 5 1.1s3.1-1.5 4-3c.9-1.5 1.1-3.3 1.1-5s-1.1-3.1-3-4zM10 10.3c-1.3.4-2.7.2-3.8-.6s-1.7-2-1.7-3.4c0-1.4.6-2.6 1.7-3.4 1.1-.8 2.5-1 3.8-.6s2.3 1.2 3 2.3 1 2.5 1 3.9c0 1.4-.4 2.7-1 3.8-.6 1.1-1.7 1.8-3 2.2zM15 6a.7.7 0 1 1-1.4 0 .7.7 0 0 1 1.4 0zm-13.3 0a.7.7 0 1 1 1.4 0 .7.7 0 0 1-1.4 0z"/></svg>
            <svg width="15" height="11"><path fill="#333" d="M13.2 0H1.8C.8 0 0 .8 0 1.8v7.4C0 10.2.8 11 1.8 11h11.4c1 0 1.8-.8 1.8-1.8V1.8C15 .8 14.2 0 13.2 0zM1 1.8C1 1.4 1.4 1 1.8 1h11.4c.4 0 .8.4.8.8v7.4c0 .4-.4.8-.8.8H1.8C1.4 10 1 9.6 1 9.2V1.8z"/></svg>
            <svg width="17" height="11"><path fill="#333" d="M16 0H1c-.6 0-1 .4-1 1v9c0 .6.4 1 1 1h15c.6 0 1-.4 1-1V1c0-.6-.4-1-1-1zm-.5 1.5v8c0 .3-.2.5-.5.5H2c-.3 0-.5-.2-.5-.5v-8c0-.3.2-.5.5-.5h13c.3 0 .5.2.5.5zm-11 5h1v1h-1v-1zm2 0h1v1h-1v-1zm2 0h1v1h-1v-1z"/></svg>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <button class="back-btn" id="commonBackButton" style="visibility: hidden;">&#8249;</button>
        </div>
        <div class="app-title" id="commonHeaderTitle">Recommendation</div>
        <button class="menu-btn"><div class="menu-bar"></div><div class="menu-bar"></div></button>
    </div>

    <div class="content-area active" id="recommendationView">
        <div class="for-pill-container">
            <span class="for-label">For</span>
            <div class="pill">Beginner</div>
        </div>
        <div class="section-title">Ingredients I have</div>
        <div class="ingredients-card" id="ingredientList"></div>
        <div class="section-title">Recipe Recommendations</div>
        <div class="recommendation-container" id="recipeRecommendations"></div>
    </div>

    <div class="content-area" id="historyStoryView">
        <div class="for-pill-container">
            <span class="for-label">For</span>
            <div class="pill" id="storyPillText">Tomato soup</div>
        </div>
        
        <span class="small-label">Do you know..?</span>
        
        <div class="history-card" id="storyContentBlock">
            </div>
    </div>
</div>

<script>
    // --- Data ---
    const ingredientsData = ["Carrot", "Onion", "Tomato", "Pasta", "Water", "Salt", "Soy sauce"];

    const recipesData = [
        {
            id: 'soup',
            title: 'Tomato soup',
            description: 'Simple, quick, and easy!',
            image: 'https://images.unsplash.com/photo-1476718406336-bb5a9690ee2a?q=80&w=300&auto=format&fit=crop',
            keyIngredients: ['tomato', 'onion', 'water', 'salt']
        },
        {
            id: 'burger',
            title: 'Hamburger',
            description: 'Perfect meal for you!',
            image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=300&auto=format&fit=crop',
            keyIngredients: ['tomato'] // Simulating a match just for this example
        }
    ];

    // Data specifically for the History Story view
    const storyData = {
        'soup': {
            pillText: 'Tomato soup',
            titleText: 'History story~',
            contentHtml: `
                <p class="story-text">The first published recipe for tomato soup appeared in N. K. M. Lee's The Cook's Own Book in 1832.</p>
                <p class="story-text">Depending on the recipe, tomato soup is generally low in calories and high in potassium and vitamins C, K, and A. It is also rich in lycopene, a carotenoid pigment with many reputed health effects related to its antioxidant properties.</p>
                <p class="story-text">A simple tomato soup can be prepared simply with ingredients such as canned tomatoes/tomatoes, onion, garlic, olive oil, vegetable broth or chicken broth and for the flavouring butter, salt and pepper or if required sugar can be used. It can also be made fresh by blanching tomatoes, removing the skins, then blending them into a puree. Fresh tomatoes are recommended to use only when they are very ripe, because the ripeness plays a crucial role in the depth of the flavour.</p>
                <a href="https://en.wikipedia.org/wiki/Tomato_soup" class="source-link">from https://en.wikipedia.org/wiki/Tomato_soup</a>
            `
        },
        'burger': { /* Placeholder for future hamburger story */
            pillText: 'Hamburger', titleText: 'Hamburger origins~', contentHtml: '<p class="story-text">A story about hamburgers.</p>'
        }
    };

    // --- Application State ---
    let selectedIngredients = ingredientsData.map(i => i.toLowerCase());
    let currentPage = 'recommendations'; // Controls active view
    let currentStoryId = null; // Stores which story is loaded

    // --- DOM Elements ---
    const ingredientListEl = document.getElementById('ingredientList');
    const recipeContainerEl = document.getElementById('recipeRecommendations');
    const headerTitleEl = document.getElementById('commonHeaderTitle');
    const backButtonEl = document.getElementById('commonBackButton');
    const recommendationViewEl = document.getElementById('recommendationView');
    const historyStoryViewEl = document.getElementById('historyStoryView');
    // Story specific elements
    const storyPillTextEl = document.getElementById('storyPillText');
    const storyContentBlockEl = document.getElementById('storyContentBlock');

    // --- CORE LOGIC: Dynamic Views ---

    // 1. Initial Page: Render ingredients and all possible recipe cards
    function init() {
        renderIngredients();
        renderRecipes();
        updateMatches(); // Filter matches based on starting state
        backButtonEl.addEventListener('click', navigateToRecommendations); // Back logic
    }

    function renderIngredients() {
        ingredientListEl.innerHTML = '';
        ingredientsData.forEach(ing => {
            const val = ing.toLowerCase();
            const checked = selectedIngredients.includes(val);
            const itemHtml = `
                <label class="ingredient-item">
                    <input type="checkbox" class="ingredient-checkbox" value="${val}" ${checked ? 'checked' : ''}>
                    <span class="ingredient-label">${ing}</span>
                </label>
            `;
            ingredientListEl.innerHTML += itemHtml;
        });
        
        // Add event listeners *after* rendering
        document.querySelectorAll('.ingredient-checkbox').forEach(cb => {
            cb.addEventListener('change', (e) => {
                if(e.target.checked) selectedIngredients.push(e.target.value);
                else selectedIngredients = selectedIngredients.filter(s => s !== e.target.value);
                updateMatches();
            });
        });
    }

    function renderRecipes() {
        recipeContainerEl.innerHTML = '';
        recipesData.forEach(recipe => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.id = `recipe-${recipe.id}`;
            card.innerHTML = `
                <div class="recipe-image-container">
                    <img src="${recipe.image}" alt="${recipe.title}" class="recipe-image">
                </div>
                <div class="recipe-info">
                    <h3 class="recipe-title">${recipe.title}</h3>
                    <p class="recipe-description">${recipe.description}</p>
                </div>
            `;
            // NAVIGATION TRIGGER: Load the story when a card is clicked
            card.addEventListener('click', () => loadStoryAndNavigate(recipe.id));
            recipeContainerEl.appendChild(card);
        });
    }

    function updateMatches() {
        recipesData.forEach(recipe => {
            const card = document.getElementById(`recipe-${recipe.id}`);
            const canMake = recipe.keyIngredients.every(ing => selectedIngredients.includes(ing));
            if (canMake) card.classList.add('show');
            else card.classList.remove('show');
        });
    }

    // --- NAVIGATION LOGIC ---

    // Function to load data into the story view and switch views
    function loadStoryAndNavigate(id) {
        const data = storyData[id];
        if(!data) { alert(`Story not found for ${id}`); return; }

        // Populate the second view
        storyPillTextEl.textContent = data.pillText;
        storyContentBlockEl.innerHTML = data.contentHtml;
        currentStoryId = id; // Update state

        // Configure the common header for this page
        headerTitleEl.textContent = data.titleText; // "History story~"
        backButtonEl.style.visibility = 'visible'; // Show the back arrow

        // Switch Views
        recommendationViewEl.classList.remove('active');
        historyStoryViewEl.classList.add('active');
        currentPage = 'story';
    }

    // Function to go back to the recommendation page
    function navigateToRecommendations() {
        // Configure the common header for this page
        headerTitleEl.textContent = 'Recommendation';
        backButtonEl.style.visibility = 'hidden'; // Hide the back arrow

        // Switch Views
        historyStoryViewEl.classList.remove('active');
        recommendationViewEl.classList.add('active');
        currentPage = 'recommendations';
    }

    init(); // Start the application

</script>

</body>
</html>
